<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的天空待辦清單</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            /* 天空漸層背景 */
            background: linear-gradient(180deg, #7dd3fc 0%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .comic-border {
            border: 4px solid #0369a1; /* 深天藍邊框 */
            box-shadow: 10px 10px 0px rgba(3, 105, 161, 0.2);
        }

        .cloud-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 3rem;
        }

        .comic-button {
            border: 3px solid #0369a1;
            box-shadow: 4px 4px 0px #0369a1;
            transition: all 0.1s active;
        }

        .comic-button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #0369a1;
        }

        .todo-item {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid #0369a1;
        }

        .todo-item:hover {
            transform: translateY(-5px);
            box-shadow: 0px 8px 15px rgba(3, 105, 161, 0.1);
        }

        .completed-text {
            text-decoration: line-through;
            color: #7dd3fc;
            opacity: 0.7;
        }

        /* 雲朵動畫 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .float-animation {
            animation: float 4s ease-in-out infinite;
        }

        /* 自定義滾動條 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #7dd3fc;
            border-radius: 10px;
        }
    </style>
</head>
<body class="py-10 px-4">
    <div class="max-w-md w-full cloud-card comic-border overflow-hidden relative">
        <!-- 裝飾用小雲朵 (SVG) -->
        <div class="absolute top-4 right-4 text-white opacity-50 float-animation">
            <i class="fas fa-cloud text-3xl"></i>
        </div>

        <!-- 標題區域 -->
        <div class="bg-sky-400 p-8 text-center border-b-4 border-[#0369a1]">
            <h1 class="text-6xl font-black tracking-widest text-white mb-2" style="font-family: 'ZCOOL KuaiLe', cursive; text-shadow: 4px 4px 0px #0369a1;">
                <i class="fas fa-sun text-yellow-300 mr-2"></i>TO DO
            </h1>
            <div class="inline-block bg-white px-5 py-1 rounded-full border-2 border-[#0369a1] font-bold text-[#0369a1] shadow-sm">
                <span id="date-display">今天也是好天氣！</span>
            </div>
        </div>

        <!-- 輸入區域 -->
        <div class="p-6">
            <div class="flex gap-3">
                <input type="text" id="todo-input" 
                    class="flex-1 px-4 py-3 border-4 border-[#0369a1] rounded-2xl focus:outline-none bg-white placeholder-sky-200 font-bold text-sky-900"
                    placeholder="記下新任務...">
                <!-- 已將圖示改回加號 -->
                <button id="add-btn" class="bg-yellow-400 hover:bg-yellow-500 text-white w-14 h-14 rounded-2xl comic-button text-2xl flex items-center justify-center">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>

        <!-- 狀態過濾 -->
        <div class="flex justify-around px-6 py-2">
            <button onclick="filterTasks('all')" class="filter-btn bg-sky-100 px-4 py-1 rounded-xl border-2 border-[#0369a1] font-bold text-sm text-[#0369a1]" data-filter="all">全部</button>
            <button onclick="filterTasks('active')" class="filter-btn opacity-50 hover:opacity-100 px-4 py-1 font-bold text-sm text-[#0369a1]" data-filter="active">進行中</button>
            <button onclick="filterTasks('completed')" class="filter-btn opacity-50 hover:opacity-100 px-4 py-1 font-bold text-sm text-[#0369a1]" data-filter="completed">已完成</button>
        </div>

        <!-- 列表區域 -->
        <ul id="todo-list" class="p-6 space-y-4 max-h-[400px] overflow-y-auto">
            <!-- 動態生成 -->
        </ul>

        <!-- 統計與清除 -->
        <div class="p-6 bg-sky-50 border-t-4 border-dashed border-sky-200 flex justify-between items-center">
            <span id="task-count" class="font-bold text-[#0369a1]">還有 0 項任務</span>
            <button id="clear-completed" class="text-xs font-bold bg-white text-[#0369a1] px-3 py-1 rounded-lg border-2 border-[#0369a1] hover:bg-red-400 hover:text-white hover:border-red-600 transition-all">
                清除天空
            </button>
        </div>
    </div>

    <script>
        let todos = [];
        let currentFilter = 'all';

        const input = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');
        const list = document.getElementById('todo-list');
        const countSpan = document.getElementById('task-count');
        const clearBtn = document.getElementById('clear-completed');

        // 新增
        function addTodo() {
            const text = input.value.trim();
            if (text === '') return;

            const newTodo = {
                id: Date.now(),
                text: text,
                completed: false,
                color: getRandomCloudColor()
            };

            todos.push(newTodo);
            input.value = '';
            render();
        }

        function getRandomCloudColor() {
            const colors = ['bg-white', 'bg-blue-50', 'bg-cyan-50', 'bg-indigo-50'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        // 切換
        function toggleTodo(id) {
            todos = todos.map(todo => 
                todo.id === id ? { ...todo, completed: !todo.completed } : todo
            );
            render();
        }

        // 刪除
        function deleteTodo(id) {
            todos = todos.filter(todo => todo.id !== id);
            render();
        }

        // 過濾
        function filterTasks(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.filter === filter) {
                    btn.classList.add('bg-sky-100', 'border-2', 'border-[#0369a1]', 'opacity-100');
                } else {
                    btn.classList.remove('bg-sky-100', 'border-2', 'border-[#0369a1]');
                    btn.classList.add('opacity-50');
                }
            });
            render();
        }

        // 清除
        clearBtn.addEventListener('click', () => {
            todos = todos.filter(todo => !todo.completed);
            render();
        });

        // 渲染
        function render() {
            let filteredTodos = todos;
            if (currentFilter === 'active') filteredTodos = todos.filter(t => !t.completed);
            if (currentFilter === 'completed') filteredTodos = todos.filter(t => t.completed);

            list.innerHTML = '';

            filteredTodos.forEach(todo => {
                const li = document.createElement('li');
                li.className = `todo-item p-4 rounded-3xl flex items-center justify-between shadow-sm ${todo.color}`;
                
                li.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 cursor-pointer" onclick="toggleTodo(${todo.id})">
                        <div class="w-8 h-8 border-2 border-[#0369a1] rounded-full bg-white flex items-center justify-center transition-all ${todo.completed ? 'bg-sky-400 border-sky-600' : ''}">
                            ${todo.completed ? '<i class="fas fa-check text-white text-xs"></i>' : ''}
                        </div>
                        <span class="font-bold text-[#0369a1] ${todo.completed ? 'completed-text' : ''}">${todo.text}</span>
                    </div>
                    <button onclick="deleteTodo(${todo.id})" class="w-8 h-8 rounded-full hover:bg-sky-200 flex items-center justify-center transition-colors">
                        <i class="fas fa-wind text-[#0369a1] text-xs"></i>
                    </button>
                `;
                list.appendChild(li);
            });

            const activeCount = todos.filter(t => !t.completed).length;
            countSpan.innerText = `還有 ${activeCount} 項任務`;
        }

        addBtn.addEventListener('click', addTodo);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTodo();
        });

        render();
    </script>
</body>
</html>
